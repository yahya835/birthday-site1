<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Roeya 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ffb6c1, #ffc0cb, #ffe4e1);
    color: white;
    overflow: hidden;
}

/* intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ff9aa2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#intro button {
    padding: 15px 25px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 18px;
}

/* main */
#main {
    display: none;
    margin-top: 50px;
}

button {
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
}

/* sections */
.section {
    display: none;
    max-width: 600px;
    margin: 20px auto;
}

/* image */
img {
    width: 250px;
    border-radius: 20px;
    box-shadow: 0 0 20px pink;
}

/* hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>💖 I made something for you 💖</h1>
    <button onclick="startSite()">Open 🎁</button>
</div>

<!-- MAIN -->
<div id="main">
    <h1>Happy Birthday Roeya 🎂💖</h1>

    <button onclick="showSection('msg')">🎁 Gift 1</button>
    <button onclick="showSection('flowers')">🌸 Gift 2</button>
    <button onclick="showSection('photo')">🖼️ Gift 3</button>
    <button onclick="playMusic()">🎵 Play Music</button>

    <!-- MESSAGE -->
    <div id="msg" class="section">
        💌 happy birthay to the prettiest girl i've ever seen, ever known and the coolest and the hbiiilest girl hhhh 😄<br>
        i wish you the best enjoy your day my dear roeya 💖<br>
